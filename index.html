<!-- Google tag (gtag.js) — Google Analytics 4 -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-Q1E890BD1B"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());
  gtag('config', 'G-Q1E890BD1B');

  // Rastreamento de cliques em CTAs importantes (eventos personalizados)
  document.addEventListener('DOMContentLoaded', function () {
    // WhatsApp clicks
    document.querySelectorAll('a[href*="wa.me"]').forEach(function (el) {
      el.addEventListener('click', function () {
        gtag('event', 'click_whatsapp', { event_category: 'engagement', event_label: el.href });
      });
    });
    // Instagram clicks
    document.querySelectorAll('a[href*="instagram.com"]').forEach(function (el) {
      el.addEventListener('click', function () {
        gtag('event', 'click_instagram', { event_category: 'engagement' });
      });
    });
    // Google Review clicks
    document.querySelectorAll('a[href*="g.page"], a[href*="writereview"]').forEach(function (el) {
      el.addEventListener('click', function () {
        gtag('event', 'click_avaliar_google', { event_category: 'engagement' });
      });
    });
    // Maps / Waze
    document.querySelectorAll('a[href*="google.com/maps"], a[href*="waze.com"]').forEach(function (el) {
      el.addEventListener('click', function () {
        gtag('event', 'click_como_chegar', { event_category: 'engagement', event_label: el.href.includes('waze') ? 'waze' : 'maps' });
      });
    });
    // Form submit (Agendar consulta)
    var form = document.querySelector('#agendar form');
    if (form) {
      form.addEventListener('submit', function () {
        gtag('event', 'lead_formulario_agendar', { event_category: 'conversion' });
      });
    }
  });
</script>

<script>

  (function () {
    try {
      var saved = localStorage.getItem('ea-theme');
      var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;

/* ---------- Theme toggle ---------- */
function ThemeToggle({ compact=false }) {
  const [dark, setDark] = useState(() => typeof document !== 'undefined' && document.documentElement.classList.contains('theme-dark'));
  const toggle = () => {
    const next = !dark;
    setDark(next);
    document.documentElement.classList.toggle('theme-dark', next);
    try { localStorage.setItem('ea-theme', next ? 'dark' : 'light'); } catch (e) {}
  };
  return (
    <button
      onClick={toggle}
      aria-label={dark ? 'Alternar para tema claro' : 'Alternar para tema escuro'}
      title={dark ? 'Tema claro' : 'Tema escuro'}
      className={`inline-flex items-center justify-center rounded-full border border-pearl text-ink hover:border-gold hover:text-gold transition ${compact ? 'w-10 h-10' : 'w-10 h-10'}`}>
      <Icon.Moon className="w-[18px] h-[18px] icon-moon" />
      <Icon.Sun  className="w-[18px] h-[18px] icon-sun" />
    </button>
  );
}

    return () => window.removeEventListener('scroll', on);

    <header className={`fixed top-0 inset-x-0 z-40 transition-all duration-300 ${scrolled ? 'bg-ivory/85 backdrop-blur-md border-b border-pearl' : 'bg-transparent'}`}>

/* ---------- Before/After interactive slider ---------- */
function BeforeAfter({ label = "Caso clínico" }) {
  const [pct, setPct] = useState(50);
  const wrapRef = useRef(null);
  const dragging = useRef(false);

  const move = (clientX) => {
    const el = wrapRef.current; if (!el) return;
    const r = el.getBoundingClientRect();
    const p = Math.max(0, Math.min(100, ((clientX - r.left) / r.width) * 100));
    setPct(p);
  };
  const onDown = (e) => { dragging.current = true; move(e.touches ? e.touches[0].clientX : e.clientX); };
  const onMove = (e) => { if (!dragging.current) return; move(e.touches ? e.touches[0].clientX : e.clientX); };
  const onUp = () => { dragging.current = false; };

  useEffect(() => {
    window.addEventListener('mousemove', onMove);
    window.addEventListener('mouseup', onUp);
    window.addEventListener('touchmove', onMove, { passive: true });
    window.addEventListener('touchend', onUp);
    return () => {
      window.removeEventListener('mousemove', onMove);
      window.removeEventListener('mouseup', onUp);
      window.removeEventListener('touchmove', onMove);
      window.removeEventListener('touchend', onUp);
    };
  }, []);

  return (
    <div ref={wrapRef}
         onMouseDown={onDown} onTouchStart={onDown}
         className="relative aspect-[4/5] sm:aspect-[3/4] rounded-2xl overflow-hidden select-none cursor-ew-resize border border-pearl bg-bone">
      {/* AFTER (full) */}
      <div className="absolute inset-0 ph-stripes flex items-end p-5">
        <span className="mono text-[10px] uppercase tracking-widest text-ink/50">{label} · depois</span>
      </div>
      {/* BEFORE (clipped) */}
      <div className="absolute inset-0 ph-stripes-dark flex items-end p-5" style={{ clipPath: `inset(0 ${100 - pct}% 0 0)` }}>
        <span className="mono text-[10px] uppercase tracking-widest text-gold/80">{label} · antes</span>
      </div>
      {/* Divider */}
      <div className="absolute top-0 bottom-0 ba-handle" style={{ left: `calc(${pct}% - 1px)` }}>
        <div className="w-px h-full bg-gold/90"></div>
        <div className="absolute top-1/2 -translate-y-1/2 -translate-x-1/2 w-10 h-10 rounded-full bg-ivory border border-gold flex items-center justify-center shadow-softlux">
          <svg viewBox="0 0 24 24" className="w-4 h-4 text-ink" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round">
            <path d="m9 6-6 6 6 6M15 6l6 6-6 6"/>
          </svg>
        </div>
      </div>
      <span className="absolute top-4 left-4 mono text-[10px] uppercase tracking-widest text-gold bg-ink/85 backdrop-blur px-2 py-1 rounded-full">Antes</span>
      <span className="absolute top-4 right-4 mono text-[10px] uppercase tracking-widest text-ink bg-ivory/90 backdrop-blur px-2 py-1 rounded-full">Depois</span>
    </div>
  );
}
